name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔴 SECRET SCANNING (will detect hardcoded password)
      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v2
        with:
          fail: false   # 👈 makes pipeline FAIL

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build
        run: mvn clean install

      # 🔴 SAST (may flag issues)
      - name: Run SpotBugs
        run: mvn spotbugs:check